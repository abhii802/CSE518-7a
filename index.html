<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE 7th Sem &mdash; Project Lab Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#FFFFFF;
    --navy-2:#F5F5F5;
    --grid-line:rgba(18,22,31,0.08);
    --paper:#FFFFFF;
    --paper-2:#F5F5F5;
    --ink:#12161F;
    --ink-soft:#4A5261;
    --teal:#2AC3B0;
    --teal-dim:#1C8E80;
    --amber:#E8A23A;
    --rule:#C9CDC0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#FFFFFF;
    font-family:'Source Serif 4', serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--teal);color:#04231F;}

  .app{
    display:grid;
    grid-template-columns: 340px 1fr;
    min-height:100vh;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    background:
      repeating-linear-gradient(0deg, var(--grid-line) 0px, var(--grid-line) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--grid-line) 0px, var(--grid-line) 1px, transparent 1px, transparent 28px),
      var(--navy);
    padding:28px 0 60px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    border-right:1px solid rgba(18,22,31,0.1);
  }
  .brand{
    padding:0 24px 20px;
    border-bottom:1px solid rgba(18,22,31,0.12);
    margin-bottom:10px;
  }
  .brand .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--teal);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
    font-size:22px;
    line-height:1.25;
    margin:8px 0 6px;
    font-weight:600;
  }
  .brand p{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin:0;
    line-height:1.6;
  }
  .tab-list{
    list-style:none;
    margin:14px 0 0;
    padding:0 10px;
  }
  .tab-item{
    display:flex;
    align-items:baseline;
    gap:10px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    cursor:pointer;
    padding:10px 12px;
    border-radius:4px;
    color:var(--ink-soft);
    font-family:'Space Grotesk', sans-serif;
    font-size:13.5px;
    line-height:1.35;
    margin-bottom:2px;
    transition:background .15s ease, color .15s ease;
  }
  .tab-item:hover{ background:rgba(42,195,176,0.08); color:var(--ink); }
  .tab-item.active{
    background:rgba(42,195,176,0.14);
    color:var(--ink);
    box-shadow:inset 3px 0 0 var(--teal);
  }
  .tab-item .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--teal);
    flex:0 0 auto;
    padding-top:1px;
  }
  .tab-item .tname{ flex:1; }
  .tab-item .tdomain{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.04em;
    color:#6C7789;
    text-transform:uppercase;
    margin-top:2px;
  }

  /* ---------- MAIN ---------- */
  .main{
    background:var(--paper);
    position:relative;
    padding:56px 64px 90px;
  }
  .main::before, .main::after,
  .corner-tl, .corner-br{
    content:"";
  }
  .corner-frame{
    position:absolute;
    inset:24px;
    pointer-events:none;
  }
  .corner-frame span{
    position:absolute;
    width:22px;
    height:22px;
    border:1.5px solid rgba(18,22,31,0.35);
  }
  .corner-frame .tl{ top:0; left:0; border-right:none; border-bottom:none; }
  .corner-frame .tr{ top:0; right:0; border-left:none; border-bottom:none; }
  .corner-frame .bl{ bottom:0; left:0; border-right:none; border-top:none; }
  .corner-frame .br{ bottom:0; right:0; border-left:none; border-top:none; }

  .charter{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:24px;
    padding-bottom:26px;
    border-bottom:2px solid var(--ink);
    margin-bottom:34px;
  }
  .charter-left{ max-width:640px; }
  .charter .code{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--teal-dim);
    text-transform:uppercase;
    margin-bottom:10px;
    display:block;
  }
  .charter h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:34px;
    line-height:1.15;
    margin:0 0 14px;
    font-weight:700;
    color:var(--ink);
  }
  .charter .brief{
    font-size:16px;
    line-height:1.6;
    color:var(--ink-soft);
    margin:0;
  }
  .stamp{
    flex:0 0 auto;
    width:118px;
    height:118px;
    border-radius:50%;
    border:2px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transform:rotate(-8deg);
    position:relative;
  }
  .stamp::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px dashed rgba(18,22,31,0.5);
    border-radius:50%;
  }
  .stamp .stxt{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    line-height:1.5;
    color:var(--ink);
    text-transform:uppercase;
  }
  .stamp .sdur{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:700;
    display:block;
    margin:2px 0;
  }

  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:36px;
  }
  .meta-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.02em;
    color:var(--ink);
    background:var(--paper-2);
    border:1px solid var(--rule);
    padding:7px 12px;
    border-radius:3px;
  }
  .meta-chip b{ color:var(--teal-dim); }

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--teal-dim);
    margin:0 0 16px;
    padding-bottom:8px;
    border-bottom:1px solid var(--rule);
  }

  .roles{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:44px;
  }
  .role-card{
    background:#fff;
    border:1px solid var(--rule);
    border-radius:4px;
    padding:14px 16px;
  }
  .role-card .rn{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .role-card .rt{
    font-family:'Space Grotesk', sans-serif;
    font-size:14.5px;
    font-weight:600;
    margin-top:4px;
    color:var(--ink);
  }

  .timeline{
    position:relative;
    padding-left:2px;
  }
  .month-block{
    display:grid;
    grid-template-columns:150px 1fr;
    gap:28px;
    padding:26px 0;
    border-top:1px solid var(--rule);
  }
  .month-block:first-child{ border-top:none; padding-top:0; }
  .month-marker{
    position:relative;
  }
  .month-marker .mno{
    font-family:'Space Grotesk', sans-serif;
    font-size:40px;
    font-weight:700;
    color:var(--ink);
    line-height:1;
  }
  .month-marker .mno span{ color:var(--teal); }
  .month-marker .mlabel{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:6px;
    display:block;
  }
  .month-content h4{
    font-family:'Space Grotesk', sans-serif;
    font-size:17px;
    margin:0 0 12px;
    color:var(--ink);
    font-weight:600;
  }
  .steps{
    margin:0;
    padding:0;
    list-style:none;
  }
  .steps li{
    position:relative;
    padding-left:22px;
    margin-bottom:9px;
    font-size:15px;
    line-height:1.55;
    color:#242A35;
  }
  .steps li::before{
    content:"";
    position:absolute;
    left:0;
    top:8px;
    width:7px;
    height:7px;
    background:var(--teal);
    border-radius:1px;
    transform:rotate(45deg);
  }

  .deliverable-note{
    margin-top:44px;
    padding:18px 22px;
    background:var(--navy-2);
    border:1px solid var(--rule);
    border-radius:6px;
    color:var(--ink);
  }
  .deliverable-note .dl-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:8px;
    display:block;
  }
  .deliverable-note p{ margin:0; font-size:14.5px; line-height:1.6; }

  @media (max-width: 980px){
    .app{ grid-template-columns:1fr; }
    .sidebar{ height:auto; position:relative; }
    .main{ padding:40px 22px 70px; }
    .charter{ flex-direction:column; }
    .roles{ grid-template-columns:repeat(2,1fr); }
    .month-block{ grid-template-columns:1fr; gap:10px; }
    .charter h2{ font-size:26px; }
  }
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar">
    <div class="brand">
      <span class="eyebrow">B.Tech CSE &middot; 7th Semester</span>
      <h1>Project Lab Catalogue</h1>
      <p>20 group projects &middot; 4 students/team &middot; 4-month build cycle</p>
    </div>
    <ul class="tab-list" id="tabList"></ul>
  </nav>

  <main class="main">
    <div class="corner-frame">
      <span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span>
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
const PROJECTS = [
{
  code:"CSE-701", domain:"Artificial Intelligence", title:"AI Resume Screening Portal",
  brief:"A web portal that parses uploaded resumes, scores candidates against a job description using NLP similarity, and ranks shortlists for a recruiter dashboard.",
  stack:"Python, spaCy/scikit-learn, FastAPI, React, PostgreSQL",
  roles:["Resume Parsing & NLP Engine","Ranking & Scoring Logic","Recruiter Dashboard (Frontend)","Backend API & Database"],
  months:[
    {label:"Foundation", title:"Requirement study & dataset preparation",
      steps:["Study 15-20 sample job descriptions and resumes to identify common fields (skills, experience, education).",
        "Collect an open resume dataset (e.g. Kaggle resume datasets) and clean it into a usable text corpus.",
        "Finalise tech stack: Python for NLP pipeline, FastAPI for backend, React for dashboard, PostgreSQL for storage.",
        "Design the database schema for candidates, jobs, and scores; draw the system architecture diagram."]},
    {label:"Core Build", title:"Resume parsing & similarity engine",
      steps:["Build a PDF/DOCX text extractor using PyMuPDF/python-docx.",
        "Use spaCy for named-entity extraction (skills, education, years of experience).",
        "Implement TF-IDF/embedding based similarity scoring between resume text and job description.",
        "Expose parsing and scoring as REST endpoints via FastAPI; write unit tests for each endpoint."]},
    {label:"Integration", title:"Dashboard, ranking & filters",
      steps:["Build the React dashboard: job posting form, resume upload, ranked candidate list.",
        "Add filters (minimum experience, required skill match %, education level).",
        "Connect frontend to backend APIs; implement authentication for recruiter login.",
        "Add explainability: show matched/missing skills per candidate on click."]},
    {label:"Finish Line", title:"Testing, deployment & documentation",
      steps:["Test with 50+ real-style resumes across 3 job roles; tune scoring weights.",
        "Fix bugs, handle edge cases (scanned/image resumes, missing fields).",
        "Deploy backend on Render/Railway and frontend on Vercel/Netlify (free tiers).",
        "Prepare final report, architecture diagram, and a 10-minute demo video/PPT."]}
  ]
},
{
  code:"CSE-702", domain:"Blockchain", title:"Blockchain Secure Voting System",
  brief:"A permissioned blockchain-based e-voting application ensuring tamper-proof votes, voter authentication, and transparent public result verification.",
  stack:"Solidity, Hardhat/Truffle, Ethereum testnet (Sepolia)/Ganache, React, MetaMask",
  roles:["Smart Contract Development","Voter Authentication Module","Frontend Voting Interface","Testing & Blockchain Deployment"],
  months:[
    {label:"Foundation", title:"Blockchain basics & design",
      steps:["Study blockchain fundamentals, Ethereum, and Solidity syntax through official docs/tutorials.",
        "Design the voting workflow: registration, candidate list, single-vote enforcement, result tally.",
        "Set up local blockchain (Ganache) and development environment (Hardhat, Node.js, MetaMask).",
        "Draw the smart contract data model: Voter struct, Candidate struct, mappings for vote tracking."]},
    {label:"Core Build", title:"Smart contract development",
      steps:["Write the Solidity voting contract with functions: registerVoter, vote, getResults, only-owner modifiers.",
        "Implement checks preventing double voting and voting after deadline using block.timestamp.",
        "Write Hardhat test scripts to validate contract logic (registration, voting, tallying).",
        "Deploy contract to a local Ganache network and verify with test transactions."]},
    {label:"Integration", title:"Frontend & authentication",
      steps:["Build React UI for voter login (Aadhaar/roll-number based OTP simulation), candidate display, and vote casting.",
        "Integrate MetaMask/Ethers.js so votes are signed and sent as blockchain transactions.",
        "Build an admin panel to add candidates and close voting after the deadline.",
        "Display live, publicly verifiable result count once voting ends."]},
    {label:"Finish Line", title:"Testnet deployment & report",
      steps:["Deploy the contract to a public testnet (Sepolia) using free faucet test ETH.",
        "Conduct a mock election with 30+ test voters; record gas costs and transaction times.",
        "Perform security review (reentrancy checks, access control) and fix any issues found.",
        "Document architecture, contract ABI, and prepare the final demonstration."]}
  ]
},
{
  code:"CSE-703", domain:"Computer Vision", title:"Face Recognition Attendance System",
  brief:"An automated classroom attendance system using real-time face detection and recognition through a webcam, logging attendance to a database with a teacher dashboard.",
  stack:"Python, OpenCV, face_recognition/DeepFace, Flask, SQLite",
  roles:["Face Detection & Enrollment Module","Recognition Engine & Matching","Attendance Backend & Database","Teacher Dashboard (Frontend)"],
  months:[
    {label:"Foundation", title:"Setup & face dataset collection",
      steps:["Study face detection (Haar cascades/MTCNN) vs recognition (embeddings) concepts.",
        "Set up Python environment with OpenCV, dlib/face_recognition, and Flask.",
        "Build an enrollment script capturing 10-15 images per student to create face embeddings.",
        "Design database schema: students, embeddings, attendance logs with timestamps."]},
    {label:"Core Build", title:"Recognition pipeline",
      steps:["Implement real-time webcam face detection and cropping using OpenCV.",
        "Generate and store 128-d face embeddings per student using face_recognition library.",
        "Implement matching logic comparing live captured face to stored embeddings with a distance threshold.",
        "Mark attendance automatically once a match is confirmed, avoiding duplicate entries per session."]},
    {label:"Integration", title:"Dashboard & session management",
      steps:["Build Flask backend APIs for starting a session, live recognition feed, and fetching attendance.",
        "Build a simple web dashboard showing live recognized faces and attendance list per class.",
        "Add manual override option for teachers to correct mis-marked attendance.",
        "Add export-to-Excel/CSV feature for monthly attendance reports."]},
    {label:"Finish Line", title:"Accuracy testing & deployment",
      steps:["Test recognition accuracy under varied lighting, angles, and with masks; tune thresholds.",
        "Optimise frame processing rate for smoother real-time performance on a standard laptop webcam.",
        "Deploy on a local machine/Raspberry Pi for classroom use; write setup instructions.",
        "Prepare final documentation, accuracy report, and live demo."]}
  ]
},
{
  code:"CSE-704", domain:"Natural Language Processing", title:"Fake News Detection Engine",
  brief:"A machine learning system that classifies news articles or headlines as real or fake, with a browser extension/web app for quick verification.",
  stack:"Python, scikit-learn/BERT, Flask, Chrome Extension APIs, React",
  roles:["Dataset Curation & Preprocessing","ML Model Training","Backend API Service","Browser Extension/Web App"],
  months:[
    {label:"Foundation", title:"Dataset & problem framing",
      steps:["Download open fake/real news datasets (e.g. LIAR, Kaggle Fake News dataset).",
        "Clean text data: remove HTML, stopwords, punctuation; perform exploratory data analysis.",
        "Study TF-IDF and transformer-based text classification approaches.",
        "Finalise architecture: preprocessing pipeline, model service, and client interface."]},
    {label:"Core Build", title:"Model training & evaluation",
      steps:["Train a baseline model (Logistic Regression/Naive Bayes with TF-IDF) and record accuracy.",
        "Fine-tune a lightweight transformer (DistilBERT) for improved accuracy; compare both models.",
        "Evaluate using precision, recall, F1-score, and confusion matrix on a held-out test set.",
        "Save the best-performing model using joblib/HuggingFace format."]},
    {label:"Integration", title:"API & client interface",
      steps:["Build a Flask REST API that accepts text/URL and returns a fake/real probability score.",
        "Build a simple React web app where users paste an article link or text for verification.",
        "Optionally build a Chrome extension that highlights suspicious articles while browsing.",
        "Add a confidence-based explanation showing top contributing words/phrases."]},
    {label:"Finish Line", title:"Validation & release",
      steps:["Test with recent real-world news articles not present in training data.",
        "Handle edge cases: satire articles, very short headlines, non-English text.",
        "Deploy API on a free cloud service and package the extension for local installation.",
        "Compile final report comparing model performance and prepare demo."]}
  ]
},
{
  code:"CSE-705", domain:"Conversational AI", title:"AI College Helpdesk Chatbot",
  brief:"An intelligent chatbot answering student queries about admissions, timetables, fees, and events, integrated into the college website with an admin knowledge-base editor.",
  stack:"Python, Rasa/LangChain, FastAPI, React, MongoDB",
  roles:["Intent & NLU Design","Dialogue Management Backend","Knowledge Base & Admin Panel","Chat Widget Frontend"],
  months:[
    {label:"Foundation", title:"Scope & intent design",
      steps:["Collect 100+ frequently asked student questions across categories (fees, exams, hostel, events).",
        "Define intents and entities (e.g. 'fee_query', 'exam_date', with entity 'semester').",
        "Choose framework: Rasa for full NLU control, or LangChain + an LLM API for faster setup.",
        "Design the conversation flow diagrams for top 10 query categories."]},
    {label:"Core Build", title:"NLU training & dialogue logic",
      steps:["Train the intent classifier and entity extractor with labelled example utterances.",
        "Build dialogue management rules/stories handling multi-turn conversations and fallbacks.",
        "Connect the bot to a MongoDB-backed knowledge base for dynamic answers (fee amounts, dates).",
        "Implement a fallback-to-human-query logging mechanism for unanswered questions."]},
    {label:"Integration", title:"Admin panel & website widget",
      steps:["Build an admin panel where staff can add/edit FAQ answers without touching code.",
        "Build an embeddable chat widget (React) for the college website with typing indicators.",
        "Add support for quick-reply buttons for common queries (menu-driven shortcuts).",
        "Integrate basic analytics: most-asked questions, unresolved query count."]},
    {label:"Finish Line", title:"Testing & rollout",
      steps:["Conduct testing with 20+ students asking varied real questions; measure intent accuracy.",
        "Retrain the model on newly logged unanswered queries to close gaps.",
        "Deploy backend and widget on a free hosting tier; embed on a sample college webpage.",
        "Prepare documentation and a live demo covering both student and admin views."]}
  ]
},
{
  code:"CSE-706", domain:"AgriTech / AI", title:"AI Crop Advisory & Yield Prediction Platform",
  brief:"A web platform that uses public weather, soil, and satellite data APIs together with machine learning to give farmers real-time crop-health insights, irrigation advice, and yield predictions — entirely software-based, with no custom hardware to build or maintain.",
  stack:"Python, scikit-learn/TensorFlow, Flask, OpenWeatherMap API, Sentinel Hub/NASA POWER API, React",
  roles:["ML Model Design (Yield Prediction)","Weather & Satellite Data Pipeline","Backend & Advisory Logic","Farmer-Facing Dashboard Frontend"],
  months:[
    {label:"Foundation", title:"Data sourcing & problem framing",
      steps:["Study publicly available agricultural datasets (Kaggle crop-yield datasets, data.gov.in) and identify usable weather/soil parameters.",
        "Set up free-tier API access for weather forecasts (OpenWeatherMap) and satellite vegetation indices (Sentinel Hub/NASA POWER).",
        "Design the system architecture: data ingestion -> preprocessing -> ML prediction -> advisory rules -> dashboard.",
        "Sketch the farmer-facing dashboard covering crop selection, region input, and advisory output."]},
    {label:"Core Build", title:"Prediction models & advisory logic",
      steps:["Train a regression model (Random Forest/XGBoost) on historical yield data using rainfall, temperature, and soil parameters as features.",
        "Build a rule-based irrigation advisory engine combining live weather forecast with crop-specific water-requirement tables.",
        "Integrate satellite-derived vegetation index (NDVI) data to flag crop-health anomalies for a selected farm region.",
        "Implement a pest/disease risk-scoring module based on temperature-humidity combinations known to favour common pests."]},
    {label:"Integration", title:"Backend API & dashboard",
      steps:["Build a Flask REST API exposing yield-prediction, irrigation-advice, and health-risk endpoints.",
        "Build a React dashboard where a farmer selects crop type and region to view predictions, alerts, and advisory in plain language.",
        "Add a historical trend view comparing predicted vs. actual yield across past seasons for validation.",
        "Add multilingual support (English/Hindi) for advisory text to widen accessibility."]},
    {label:"Finish Line", title:"Validation & documentation",
      steps:["Validate yield-prediction accuracy against held-out historical data and report error metrics (RMSE/MAE).",
        "Run a feedback session with agriculture-focused faculty or extension contacts to sanity-check advisory outputs.",
        "Deploy the platform on a free-tier host (Render/Vercel) for live demonstration.",
        "Prepare the final report with model evaluation, data-source documentation, and demo walkthrough."]}
  ]
},
{
  code:"CSE-707", domain:"Deep Learning", title:"Real-Time Sign Language Translator",
  brief:"A real-time system that captures hand gestures via webcam and translates common sign language gestures into text/speech to aid communication for the hearing-impaired.",
  stack:"Python, MediaPipe, TensorFlow/Keras, OpenCV, Streamlit",
  roles:["Gesture Dataset Collection","Model Training (CNN/LSTM)","Real-Time Inference Pipeline","App Interface & Text-to-Speech"],
  months:[
    {label:"Foundation", title:"Dataset & landmark extraction",
      steps:["Select a target gesture set (e.g. ASL/ISL alphabet plus 15-20 common words).",
        "Use MediaPipe Hands to extract hand-landmark coordinates from webcam/video samples.",
        "Collect and label a custom dataset (500+ samples per gesture) via a simple recording script.",
        "Set up the ML environment: TensorFlow/Keras, OpenCV, and MediaPipe."]},
    {label:"Core Build", title:"Model training",
      steps:["Train a CNN/LSTM classifier on the landmark-coordinate sequences for gesture recognition.",
        "Evaluate model accuracy on a validation split; tune hyperparameters to reduce misclassification.",
        "Optimise the model for real-time inference speed (reduce frame lag below 200ms).",
        "Export the trained model in TensorFlow Lite format for lightweight deployment."]},
    {label:"Integration", title:"Real-time app & speech output",
      steps:["Build a Streamlit/OpenCV app that captures webcam feed and overlays predicted gesture text live.",
        "Integrate a text-to-speech engine (pyttsx3/gTTS) to vocalise recognised words.",
        "Add a sentence-builder mode that accumulates recognised words into readable phrases.",
        "Add a confidence threshold to reduce false positives during rapid hand movement."]},
    {label:"Finish Line", title:"Testing & finalisation",
      steps:["Test with multiple users of varying hand sizes and lighting conditions; log accuracy.",
        "Refine the gesture set based on real testing feedback (remove frequently confused signs).",
        "Package the app for easy local installation with a simple setup guide.",
        "Prepare final report, accuracy benchmarks, and a live demonstration video."]}
  ]
},
{

const tabList = document.getElementById('tabList');
const content = document.getElementById('content');

function renderTabs(activeIndex){
  tabList.innerHTML = PROJECTS.map((p,i)=>`
    <li>
      <button class="tab-item ${i===activeIndex?'active':''}" data-i="${i}">
        <span class="num">${String(i+1).padStart(2,'0')}</span>
        <span class="tname">${p.title}<span class="tdomain">${p.domain}</span></span>
      </button>
    </li>
  `).join('');
  tabList.querySelectorAll('.tab-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = parseInt(btn.dataset.i,10);
      renderTabs(i);
      renderContent(i);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function renderContent(i){
  const p = PROJECTS[i];
  content.innerHTML = `
    <div class="charter">
      <div class="charter-left">
        <span class="code">${p.code} &nbsp;/&nbsp; ${p.domain}</span>
        <h2>${p.title}</h2>
        <p class="brief">${p.brief}</p>
      </div>
      <div class="stamp">
        <div class="stxt">Build Span<span class="sdur">4 MO</span>Team of 4</div>
      </div>
    </div>

    <div class="meta-row">
      <span class="meta-chip"><b>Stack:</b> ${p.stack}</span>
      <span class="meta-chip"><b>Team size:</b> 4 students</span>
      <span class="meta-chip"><b>Duration:</b> 4 months</span>
    </div>

    <div class="section-label">Suggested Team Roles</div>
    <div class="roles">
      ${p.roles.map((r,idx)=>`
        <div class="role-card">
          <div class="rn">Member ${idx+1}</div>
          <div class="rt">${r}</div>
        </div>`).join('')}
    </div>

    <div class="section-label">Month-by-Month Execution Plan</div>
    <div class="timeline">
      ${p.months.map((m,idx)=>`
        <div class="month-block">
          <div class="month-marker">
            <div class="mno">M<span>${idx+1}</span></div>
            <span class="mlabel">${m.label}</span>
          </div>
          <div class="month-content">
            <h4>${m.title}</h4>
            <ul class="steps">
              ${m.steps.map(s=>`<li>${s}</li>`).join('')}
            </ul>
          </div>
        </div>`).join('')}
    </div>

    <div class="deliverable-note">
      <span class="dl-label">Final Deliverables</span>
      <p>Working prototype/deployment, source code repository, month-wise progress log, final project report with architecture diagrams, and a live demonstration to the evaluation panel.</p>
    </div>
  `;
}

renderTabs(0);
renderContent(0);
</script>
</body>
</html>
